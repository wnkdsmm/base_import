<!DOCTYPE html>
<html>
<head>
    <title>Table: {{ table_name }}</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Menu</h2>
        <button onclick="location.href='/'">Back to Main</button>
        <button onclick="location.href='/forecasting'">Прогнозирование</button>
        <button onclick="location.href='/tables'">Back to Tables</button>
    </div>
    <div class="main">
        <h1>Table: {{ table_name }}</h1>
        <p>Showing first 100 rows</p>
        <table>
            <thead>
                <tr>
                    {% for col in columns %}
                        <th>{{ col }}</th>
                    {% endfor %}
                </tr>
            </thead>
            <tbody>
                {% for row in rows %}
                <tr>
                    {% for value in row %}
                        <td>{{ value }}</td>
                    {% endfor %}
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
