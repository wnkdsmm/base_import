                        const layer = new ol.layer.Vector({
                            source: new ol.source.Vector({features: catFeatures}),
                            style: createStyle(cat),
                            visible: true
                        });
                        categoryLayers[cat] = layer;
                        map.addLayer(layer);
                    }
                });

                const overlay = new ol.Overlay({
                    element: document.createElement('div'),
                    positioning: 'bottom-center',
                    autoPan: true
                });
                map.addOverlay(overlay);

                map.on('click', e => {
                    const feature = map.forEachFeatureAtPixel(e.pixel, f => f);
                    if (feature) {
                        overlay.setPosition(feature.getGeometry().getCoordinates());
                        overlay.getElement().innerHTML =
                            '<div class="popup">' + feature.get('popup') + '</div>';
                    } else {
                        overlay.setPosition(undefined);
                    }
                });

                const checkboxes = document.querySelectorAll('#map-container-0 .category-filter');
                const updateLayers = () => {
                    checkboxes.forEach(cb => {
                        const layer = categoryLayers[cb.dataset.category];
                        if (layer) layer.setVisible(cb.checked);
                    });
                };

                checkboxes.forEach(cb => cb.addEventListener('change', updateLayers));

                document.getElementById('select-all-0').addEventListener('click', () => {
                    checkboxes.forEach(cb => cb.checked = true);
                    updateLayers();
                });

                document.getElementById('deselect-all-0').addEventListener('click', () => {
                    checkboxes.forEach(cb => cb.checked = false);
                    updateLayers();
                });

                map.addControl(new ol.control.FullScreen());
                map.addControl(new ol.control.ScaleLine());

                window['map0'] = map;
                setTimeout(() => {
                    map.updateSize();
                    restoreMapView();
                }, 200);
            })();
        </script>
        
    <script>
        // Resize maps after tab switches
        
        window.addEventListener('resize', () => {
            for (let i = 0; i < 1; i++) window['map' + i]?.updateSize();
        });
    </script>
</body>
</html>
